services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: coffeediary
      MARIADB_USER: app
      MARIADB_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: coffeediary
      DB_USER: app
      DB_PASSWORD: app
      ACTUATOR_USERNAME: actuator
      ACTUATOR_PASSWORD: changeme
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend

volumes:
  db-data:

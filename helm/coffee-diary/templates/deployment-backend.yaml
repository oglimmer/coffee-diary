apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coffee-diary.backend.fullname" . }}
  labels:
    {{- include "coffee-diary.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "coffee-diary.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "coffee-diary.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "coffee-diary.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Values.backend.name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        # Database
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: {{ include "coffee-diary.fullname" . }}-config
              key: database.host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "coffee-diary.fullname" . }}-config
              key: database.port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: {{ include "coffee-diary.fullname" . }}-config
              key: database.name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: coffee-diary-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: coffee-diary-secret
              key: DB_PASSWORD
        # Actuator
        - name: ACTUATOR_USERNAME
          valueFrom:
            secretKeyRef:
              name: coffee-diary-secret
              key: ACTUATOR_USERNAME
        - name: ACTUATOR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: coffee-diary-secret
              key: ACTUATOR_PASSWORD
        # OIDC
        - name: OIDC_ISSUER_URL
          valueFrom:
            configMapKeyRef:
              name: {{ include "coffee-diary.fullname" . }}-config
              key: oidc.issuer-url
        - name: OIDC_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: {{ include "coffee-diary.fullname" . }}-config
              key: oidc.client-id
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: coffee-diary-secret
              key: OIDC_CLIENT_SECRET
        - name: OIDC_REDIRECT_URL
          valueFrom:
            configMapKeyRef:
              name: {{ include "coffee-diary.fullname" . }}-config
              key: oidc.redirect-url
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: {{ include "coffee-diary.fullname" . }}-config
              key: frontend.url
        # Session
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: coffee-diary-secret
              key: SESSION_SECRET
        - name: COOKIE_SECURE
          value: "true"
        startupProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 2
          periodSeconds: 3
          timeoutSeconds: 2
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

spring:
  session:
    timeout: 90d
  datasource:
    url: jdbc:mariadb://localhost:3306/coffeediary
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  thymeleaf:
    check-template-location: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

actuator:
  username: ${ACTUATOR_USERNAME:actuator}
  password: ${ACTUATOR_PASSWORD:changeme}

info:
  app:
    name: "@project.name@"
    version: "@project.version@"
    build-time: "@maven.build.timestamp@"
